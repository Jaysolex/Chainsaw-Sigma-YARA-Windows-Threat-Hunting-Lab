title: Office Macro Execution Detected
id: 12345678-1234-1234-1234-123456789012
status: production
description: |
  Detects when Office applications (Word, Excel, PowerPoint, Outlook) spawn suspicious 
  child processes typically associated with malicious macro execution. This is a classic 
  initial access pattern.
  
  Attack Pattern: User opens Office document → Macro enabled → PowerShell/CMD spawned
  Severity: CRITICAL
  
author: SOC Threat Hunting Playbook
date: 2026-06-07
tags:
  - attack.execution
  - attack.t1059
  - attack.t1566
  - detection.macro
  - office_malware
  - sysmon

logsource:
  category: process_creation
  product: windows

detection:
  parent_office:
    ParentImage|endswith:
      - '\winword.exe'
      - '\excel.exe'
      - '\powerpnt.exe'
      - '\outlook.exe'
      - '\onenote.exe'
  
  child_suspicious:
    Image|endswith:
      - '\powershell.exe'
      - '\cmd.exe'
      - '\cscript.exe'
      - '\wscript.exe'
      - '\regsvcs.exe'
      - '\regasm.exe'
      - '\mshta.exe'
      - '\rundll32.exe'
      - '\certutil.exe'
      - '\bitsadmin.exe'
  
  condition: parent_office and child_suspicious

falsepositives:
  - Legitimate Office macros (rare in enterprise)
  - Office updates or plugins (legitimate Office processes spawning children are uncommon)
  - Administrative VBA usage (whitelisted by user)

level: critical

fields:
  - ParentImage
  - Image
  - CommandLine
  - User
  - Computer

timeframe: 5m
groupby:
  - ParentImage
  - Image
  - Computer

windows_logsource:
  channel: Microsoft-Windows-Sysmon/Operational
  event_id: 1

mitre_attack:
  - technique: T1566
    subtechnique: T1566.001
    name: Phishing
  - technique: T1059
    subtechnique: T1059.001
    name: PowerShell
  - technique: T1647
    name: Defective Macro Execution
